name: Daily Prices

on:
  schedule:
    - cron: "30 22 * * 1-5"  # Weekdays 6:30 PM ET (UTC-4)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch and ingest daily prices
        env:
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
        run: python -m src.universe.ingestion

      - name: Append today's prices to quant price cache
        run: python -m src.selection.quant --refresh-cache

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.nosync/quant/recent_prices.parquet data.nosync/quant/history_gaps.json || true
          git add -f data.nosync/prices/prices.parquet || true
          git diff --staged --quiet || git commit -m "chore: daily prices $(date -u +%Y-%m-%d) [skip ci]"
          git pull --rebase origin main
          git push
