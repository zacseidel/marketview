name: Trade Cycle

on:
  schedule:
    - cron: "0 17 * * 2,5"   # Tue/Fri 11:00 AM MT (UTC-6 MDT)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  trade-cycle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch latest prices (previous trading day; skips if already present)
        env:
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
        run: python -m src.universe.ingestion

      - name: Process queue (splits, options chains, pending tasks)
        env:
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
        run: python -m src.collection.process_queue

      - name: Run enabled selection models and generate decision markdown
        env:
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
        run: python -m src.selection.runner

      - name: Update model scorecards
        env:
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
        run: python -m src.tracking.model_scorecard

      - name: Regenerate daily dashboard
        env:
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
        run: python -m src.reports.daily

      - name: Commit outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.nosync/models/ data.nosync/prices/ data.nosync/queue/ \
                  data.nosync/strategy_observations/theoretical/ \
                  decisions/pending/ docs/
          git diff --staged --quiet || git commit -m "chore: trade cycle $(date -u +%Y-%m-%d) [skip ci]"
          git checkout -- . && git pull --rebase origin main
          git push
