name: Run Models

on:
  schedule:
    - cron: "0 18 * * 2,5"   # Tue/Fri 12:00 PM MT (UTC-6)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-models:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run enabled selection models and generate decision markdown
        env:
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
        run: python -m src.selection.runner

      - name: Fetch options chains for momentum picks
        env:
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
        run: python -m src.collection.process_queue

      - name: Commit outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.nosync/models/ data.nosync/strategy_observations/theoretical/
          git diff --staged --quiet || git commit -m "chore: model run $(date -u +%Y-%m-%d) [skip ci]"
          git pull --rebase origin main
          git push
