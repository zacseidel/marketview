name: Run Models

on:
  schedule:
    - cron: "30 23 * * 1,4"  # Mon/Thu 7:30 PM ET (UTC-4)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-models:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run enabled selection models and generate decision markdown
        env:
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
        run: python -m src.selection.runner

      - name: Commit outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/models/ decisions/pending/
          git diff --staged --quiet || git commit -m "chore: model run $(date -u +%Y-%m-%d) [skip ci]"
          git push
