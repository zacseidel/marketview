name: Quarterly Fundamentals Refresh

# Fundamentals are maintained locally and committed to the repo.
# Run locally every few weeks (caps at 100 tickers per run to stay within rate limits):
#
#   python -m src.collection.fundamentals
#   git add data.nosync/fundamentals/
#   git commit -m "chore: fundamentals refresh YYYY-MM-DD"
#   git push
#
# This workflow is intentionally disabled — fetching ~900 tickers at 5 calls/min
# would take hours and is better suited to a background local process.

on:
  workflow_dispatch:  # manual trigger only, for emergencies

jobs:
  refresh-fundamentals:
    runs-on: ubuntu-latest
    if: false  # disabled — run locally instead
    steps:
      - run: echo "Run python -m src.collection.fundamentals locally instead."
