name: Universe Refresh

on:
  schedule:
    - cron: "0 16 * * 0"  # Sunday 12:00 PM ET (UTC-4)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  universe-refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Reconcile universe and queue new index additions
        env:
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
        run: python -m src.universe.reconcile

      - name: Commit universe data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/universe/ data/queue/
          git diff --staged --quiet || git commit -m "chore: universe refresh $(date -u +%Y-%m-%d) [skip ci]"
          git push
