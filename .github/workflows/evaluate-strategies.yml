name: Evaluate Strategies

on:
  schedule:
    - cron: "0 0 * * 2-6"  # Weekdays 8:00 PM ET (UTC-4), runs Tue–Sat UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  evaluate-strategies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Evaluate strategies for portfolio stocks
        env:
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
        run: python -m src.strategy.runner

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.nosync/options/ data.nosync/positions/ data.nosync/strategy_observations/
          git diff --staged --quiet || git commit -m "chore: evaluate strategies $(date -u +%Y-%m-%d) [skip ci]"
          git pull --rebase origin main
          git push
