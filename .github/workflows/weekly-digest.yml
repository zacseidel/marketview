name: Weekly Digest

on:
  schedule:
    - cron: "0 14 * * 6"  # Saturday 10:00 AM ET (UTC-4)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  weekly-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update model scorecards
        run: python -m src.tracking.model_scorecard
        env:
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}

      - name: Generate weekly digest
        run: python -m src.reports.weekly
        env:
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}

      - name: Commit digest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ data/models/
          git diff --staged --quiet || git commit -m "chore: weekly digest $(date -u +%Y-%m-%d) [skip ci]"
          git push
