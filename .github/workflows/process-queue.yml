name: Process Queue

on:
  schedule:
    - cron: "30 17 * * 1-5"  # Weekdays 11:30 AM MT (UTC-6)
    - cron: "0 22 * * 2,5"   # Tue/Fri 4:00 PM MT (UTC-6) — fetch execution-day prices after market close
  workflow_dispatch:

permissions:
  contents: write

jobs:
  process-queue:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Process pending queue tasks
        env:
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
        run: python -m src.collection.process_queue

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.nosync/queue/ data.nosync/options/ data.nosync/universe/ data.nosync/splits/
          git diff --staged --quiet || git commit -m "chore: process queue $(date -u +%Y-%m-%d) [skip ci]"
          git pull --rebase origin main
          git push
