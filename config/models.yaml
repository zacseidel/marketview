# Market Tracker — Model Registry
# Each model must implement src/selection/base.py's SelectionModel interface.
# Set enabled: false to skip a model on evaluation runs.

models:
  momentum:
    enabled: true
    module: "src.selection.momentum"
    class: "MomentumModel"
    description: "Top 5 S&P 500 tickers by trailing 12-month return (252 trading days), with rank-stability filter (rank must not drop week-over-week)"
    params:
      max_holdings: 5
      time_based_exit_days: 10

  munger:
    enabled: true
    module: "src.selection.munger"
    class: "MungerModel"
    description: "Top 100 S&P 500 by market cap; buy if price touched SMA200 in last 21 days and is currently above EMA15; sell if price drops below EMA15"
    params:
      universe_size: 100
      sma_long: 200
      ema_short: 15
      dip_lookback: 21
      max_holdings: 5
      time_based_exit_days: 10

  repurchase:
    enabled: true
    module: "src.selection.repurchase"
    class: "RepurchaseModel"
    description: "Top 5 by trailing-12-month share buyback % (shares repurchased / shares outstanding); must be above 21-day EMA. Sell if drops out of top 5 or below EMA. NOTE: currently runs on S&P 400 universe — will expand to S&P 500 once fundamentals bulk fetch is run."
    params:
      max_holdings: 5
      time_based_exit_days: 10

  buyback:
    enabled: false
    module: "src.selection.buyback"
    class: "BuybackModel"
    description: "Flags tickers with 2+ consecutive quarters of declining share count (>=1%/quarter)"
    params:
      min_consecutive_quarters: 2
      min_quarterly_reduction_pct: 0.01
      min_conviction: 0.50
      max_holdings: 5

  watchlist:
    enabled: true
    module: "src.selection.watchlist"
    class: "WatchlistModel"
    description: "Reads config/watchlist.yaml; produces holdings from user-curated tickers"
    params:
      watchlist_path: "config/watchlist.yaml"
      max_holdings: 5
      time_based_exit_days: 10

  quant_gbm:
    enabled: false
    module: "src.selection.quant"
    class: "QuantModel"
    description: "LightGBM regression on 15 pure technical factors; trained on 10yr SP500/400 history; predicts 20d forward log return. Val Sharpe: 0.794, excess return +1.46%/period vs SPY."
    params:
      model: "gbm"
      max_holdings: 5
      time_based_exit_days: 10

  quant_gbm_v3:
    enabled: false
    module: "src.selection.quant_v3"
    class: "QuantModelV3"
    description: "LightGBM v3: 28 technical (incl. log_ret_756d) + buyback + earnings + SPY market state + sector features; 10d forward log return target; trained on 10yr history. Val Sharpe: 1.125, excess return +0.84%/period vs SPY."
    params:
      max_holdings: 5
      time_based_exit_days: 10   # sell exactly 10 trading days after new_buy

  quant_gbm_v4:
    enabled: false
    module: "src.selection.quant_v4"
    class: "QuantModelV4"
    description: "XGBoost v4: 35 features (slope/R² regressions, dollar volume, earnings timing, sector 126d, in_sp500); Thursday-weekly raw 5d return target; 5d forward window. Friday cycle only. Superseded by quant_gbm_v5."
    params:
      max_holdings: 5
      time_based_exit_days: 10

  quant_gbm_v5:
    enabled: false
    module: "src.selection.quant_v5"
    class: "QuantModelV5"
    description: "XGBoost v5: 45 features — full union of v3+v4b (tech + slope/R² + dollar vol + earnings fundamentals + buyback + sector 20d+126d + in_sp500); Thursday-weekly raw 5d return target. Val ICIR: 2.792, Sharpe: 4.369. Friday cycle only. Superseded by v6."
    params:
      max_holdings: 5
      time_based_exit_days: 10

  quant_gbm_v6:
    enabled: false
    module: "src.selection.quant_v6"
    class: "QuantModelV6"
    description: "XGBoost v6: 44 features — v5 cleaned (R²/buyback/log_price dropped) + expanded market regime (SPY×5 + breadth×2) + richer sector (20d/60d/126d); Thursday-weekly raw 5d return target. Val ICIR: 2.431, Sharpe: 4.607. Friday cycle only."
    params:
      max_holdings: 5
      time_based_exit_days: 10

  quant_gbm_v7:
    enabled: true
    module: "src.selection.quant_v7"
    class: "QuantModelV7"
    description: "XGBoost v7: 47 features — v6 + ni_qoq_growth (clipped ±3) + ni_acceleration (clipped ±3) + earn_ret_5d_to_20d (leakage-masked); Thursday-weekly raw 5d return target. Val ICIR: 2.983, Sharpe: 4.338. Friday cycle only."
    params:
      max_holdings: 5
      time_based_exit_days: 10

  thirteen_f:
    enabled: false
    module: "src.selection.thirteen_f"
    class: "ThirteenFModel"
    description: "Placeholder — SEC EDGAR 13F institutional position tracking (Phase 5)"
    params: {}

